<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frem News AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-slate-950 text-slate-200">

    <header class="border-b border-slate-800 bg-slate-900/50 sticky top-0 backdrop-blur-md z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-cyan-400">FREM NEWS AI</h1>
            <span class="text-xs text-slate-500 bg-slate-800 px-2 py-1 rounded">Live Feed</span>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-8">
        <div id="news-feed" class="space-y-6">
            {% for item in news %}
            <article class="p-6 rounded-2xl bg-slate-900 border border-slate-800 hover:border-cyan-500/50 transition-all shadow-xl">
                <div class="flex items-center gap-3 mb-3">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-cyan-500 bg-cyan-500/10 px-2 py-1 rounded">
                        {{ item.source }}
                    </span>
                    <time class="text-xs text-slate-500">
                        {{ item.created_at.strftime('%H:%M') }}
                    </time>
                </div>
                <h2 class="text-xl font-bold text-white mb-3 leading-tight">
                    {{ item.title }}
                </h2>
                <p class="text-slate-400 text-sm leading-relaxed mb-4">
                    {{ item.cleaned_text }}
                </p>
                <div class="flex justify-between items-center pt-4 border-t border-slate-800">
                    <a href="{{ item.url }}" target="_blank" class="text-xs font-semibold text-slate-400 hover:text-cyan-400 transition">
                        Читать оригинал →
                    </a>
                </div>
            </article>
            {% endfor %}
        </div>
    </main>

</body>
</html>
